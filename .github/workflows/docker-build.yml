name: Build and Deploy Web Server

on:
  push:
    branches: [main, master]
    paths:
      - 'v2god.dockerfile'
      - 'Caddyfile'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:  # Manual trigger for updating components
    inputs:
      server_version:
        description: 'Server version (latest or specific)'
        required: false
        default: 'latest'
      plugin_version:
        description: 'Plugin version (latest or specific)'
        required: false
        default: 'latest'
      force_rebuild:
        description: 'Force rebuild (no cache)'
        required: false
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/web-server
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,prefix={{date 'YYYYMMDD'}}-
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./v2god.dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          no-cache: ${{ github.event.inputs.force_rebuild || false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVER_VERSION=${{ github.event.inputs.server_version || 'latest' }}
            PLUGIN_VERSION=${{ github.event.inputs.plugin_version || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/web-server
          short-description: "Modern Web Server with Enhanced Features"
          readme-filepath: ./README.md
